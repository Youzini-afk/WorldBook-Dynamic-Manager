name: auto-tag

on:
  push:
    branches: [main, refactor/v3]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create incremental tag
        shell: bash
        run: |
          set -euo pipefail

          RAW_BRANCH="${GITHUB_REF_NAME}"
          BRANCH="${RAW_BRANCH//\//-}"

          # 改动点：
          # 1) main 分支使用简洁的 vX.Y.Z，便于 CDN 导入。
          # 2) 其他分支使用 <branch>-vX.Y.Z，避免互相冲突。
          if [[ "$RAW_BRANCH" == "main" ]]; then
            PREFIX="v"
          else
            PREFIX="${BRANCH}-v"
          fi

          OLD_TAG="$(git tag -l "${PREFIX}*" --sort=-version:refname | head -n 1)"
          if [[ -z "$OLD_TAG" ]]; then
            MAJOR=1
            MINOR=0
            PATCH=0
          else
            VERSION="${OLD_TAG#${PREFIX}}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            MAJOR="${MAJOR:-0}"
            MINOR="${MINOR:-0}"
            PATCH="${PATCH:-0}"

            if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then MAJOR=0; fi
            if ! [[ "$MINOR" =~ ^[0-9]+$ ]]; then MINOR=0; fi
            if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then PATCH=0; fi

            if [[ "$MAJOR" -lt 1 ]]; then
              MAJOR=1
              MINOR=0
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
          fi

          NEW_TAG="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          while git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; do
            PATCH=$((PATCH + 1))
            NEW_TAG="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "Branch: ${RAW_BRANCH}"
          echo "Old tag: ${OLD_TAG:-none}"
          echo "New tag: ${NEW_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${NEW_TAG}" "${GITHUB_SHA}"
          git push origin "${NEW_TAG}"
